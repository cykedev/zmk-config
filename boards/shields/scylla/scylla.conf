# uncomment when dealing with connectivity issues
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Deep sleep: power off both halves after inactivity -> much longer battery life.
# Default timeout is 15 min (CONFIG_ZMK_IDLE_SLEEP_TIMEOUT in ms, set if needed).
CONFIG_ZMK_SLEEP=y
