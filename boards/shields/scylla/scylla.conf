# uncomment when dealing with connectivity issues
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Deep sleep: beide Hälften nach Inaktivität abschalten -> deutlich mehr Akku-Laufzeit.
# Standard-Timeout ist 15 min (CONFIG_ZMK_IDLE_SLEEP_TIMEOUT in ms, bei Bedarf setzen).
CONFIG_ZMK_SLEEP=y
